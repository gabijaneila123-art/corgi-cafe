<!DOCTYPE html>
<html lang="lt">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width", initial-scale="1.0">
        <title>Korgių kavinė - Pradžia</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <header>
            <nav class="navbar">
                <h1 class="logo">Corgi Café</h1>
                <button class="burger" id="burger"></button>
                <ul class="menu" id="menu">
                    <li><a href="index.html">Pagrindinis</a></li>
                    <li><a href="apie.html">Apie</a></li>
                    <li><a href="meniu.html">Meniu</a></li>
                    <li><a href="galerija.html">Galerija</a></li>
                    <li><a href="kontaktai.html">Kontaktai</a></li>
                </ul>
            </nav>
        </header>

        <main class="container">

        <aside class="sidebar">
            <div class="sidebar-img">
              <img src="kava-1.jfif" alt="Kava">
            </div>
            <div class="sidebar-img">
              <img src="kava-2.jfif" alt="Kava">
            </div>
            <div class="sidebar-img">
              <img src="kava-3.jfif" alt="Kava">
            </div>
            <div class="sidebar-img">
              <img src="kava-4.jfif" alt="Kava">
            </div>
            <div class="sidebar-img">
              <img src="kava-5.jfif" alt="Kava">
            </div>
        </aside>

    <section class="right-column">  

    <form id="kontaktine-forma">

    <div class="form-group">
        <label for="vardas">Vardas:</label>
        <input type="text" id="vardas" required>
    </div>

    <div class="form-group">
        <label for="email">El. paštas:</label>
        <input type="email" id="email" required>
    </div>

    <div class="form-group">
        <label for="telefonas">Telefono numeris:</label>
        <input type="number" id="telefonas">
    </div>

    <div class="form-group">
        <label for="data">Vizito data:</label>
        <input type="date" id="data">
    </div>

    <div class="form-group">
        <label for="tikslas">Vizito tikslas:</label>
        <select id="tikslas">
            <option>Kava</option>
            <option>Corgi žaidimai</option>
            <option>Rezervacija</option>
        </select>
    </div>

    <!-- CHECKBOX -->
    <div class="form-group checkbox-group">
        <label>
            <input type="checkbox">
            Sutinku, kad su manimi būtų susisiekta
        </label>
    </div>

    <!-- RADIO -->
    <div class="form-group radio-group">
        <p>Lytis:</p>
        <label>
            <input type="radio" name="lytis">
            Vyras
        </label>
        <label>
            <input type="radio" name="lytis">
            Moteris
        </label>
    </div>

    <div class="form-group">
        <label for="zinute">Žinutė:</label>
        <textarea id="zinute"></textarea>
    </div>

    <input type="submit" value="Siųsti">

    </form>
    </section>

    <section class="right-column center-img">
      <p class="speech-bubble">Rezervuok vietą ir susitikime kavinėje!</p>
      <img src="smart corgi.jpg">
    </Section>

     </main>

        <footer>
            <p>© 2025 Corgi Café | Sukurta Neilos</p>
        </footer>

        <script src="script.js"></script>
    </body>
</html>
